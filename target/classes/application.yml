spring:
  application:
    name: gestion-evenementiel
  datasource:
    url: jdbc:h2:mem:eventing;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# Swagger UI : http://localhost:8080/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

# Parametres du relay outbox (lus par OutboxRelay et OutboxEventService)
eventing:
  relay:
    poll-interval-ms: 2000      # frequence de scrutation de l'outbox
    batch-size: 50              # nb d'evenements traites par tick
    max-retries: 5             # au-dela => statut DEAD
    backoff-base-seconds: 5    # base du backoff exponentiel entre 2 reprises

# Resilience4j : applique a l'appel du fournisseur (EventPublisher)
resilience4j:
  retry:
    instances:
      eventPublisher:
        max-attempts: 3                 # tentatives courtes a l'interieur d'un tick
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.lang.Exception
  circuitbreaker:
    instances:
      eventPublisher:
        failure-rate-threshold: 50          # % d'echecs ouvrant le circuit
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s    # duree avant passage en half-open
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,retries,retryevents
  endpoint:
    health:
      show-details: always

logging:
  level:
    misterbil.eventing: DEBUG
